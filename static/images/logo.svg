<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-label="Animated CareerLens logo">
  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9">
        <animate attributeName="stop-color" values="#67e8f9;#38bdf8;#67e8f9" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#60a5fa">
        <animate attributeName="stop-color" values="#60a5fa;#8b5cf6;#60a5fa" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#d946ef">
        <animate attributeName="stop-color" values="#d946ef;#22d3ee;#d946ef" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#f8fafc"/>
      <stop offset="62%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="orb" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="55%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </radialGradient>

    <path id="ringPath" d="M600 280 A240 240 0 1 1 599.9 280" />
  </defs>

  <!-- transparent background -->

  <!-- ICON -->
  <g transform="translate(0 0)">
    <!-- outer orbit -->
    <g stroke="url(#gradA)" stroke-width="11" fill="none" stroke-linecap="round" filter="url(#glow)">
      <path d="M382 300 C432 248, 520 218, 600 214">
        <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" repeatCount="indefinite"/>
      </path>
      <path d="M648 214 C730 222, 806 256, 862 318">
        <animate attributeName="opacity" values="0.8;0.35;0.8" dur="3.2s" repeatCount="indefinite"/>
      </path>
      <path d="M887 370 C916 430, 924 510, 902 580">
        <animate attributeName="opacity" values="0.45;1;0.45" dur="3.5s" repeatCount="indefinite"/>
      </path>
      <path d="M859 641 C812 709, 741 760, 654 781">
        <animate attributeName="opacity" values="1;0.45;1" dur="2.6s" repeatCount="indefinite"/>
      </path>
      <path d="M583 788 C499 785, 424 755, 365 700">
        <animate attributeName="opacity" values="0.45;1;0.45" dur="3.1s" repeatCount="indefinite"/>
      </path>
      <path d="M324 640 C282 575, 270 489, 292 409">
        <animate attributeName="opacity" values="0.8;0.35;0.8" dur="3.8s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- orbit nodes -->
    <g filter="url(#glow)">
      <circle cx="386" cy="305" r="16" fill="#38bdf8">
        <animate attributeName="r" values="14;17;14" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="600" cy="214" r="16" fill="#93c5fd">
        <animate attributeName="r" values="14;18;14" dur="2.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="815" cy="304" r="16" fill="#c084fc">
        <animate attributeName="r" values="14;17;14" dur="2.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="886" cy="505" r="16" fill="#7dd3fc">
        <animate attributeName="r" values="14;18;14" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="600" cy="791" r="16" fill="#a78bfa">
        <animate attributeName="r" values="14;17;14" dur="2.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="369" cy="708" r="16" fill="#38bdf8">
        <animate attributeName="r" values="14;18;14" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="292" cy="505" r="16" fill="#60a5fa">
        <animate attributeName="r" values="14;17;14" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- magnifier circular body -->
    <g filter="url(#glow)">
      <path d="M512 292
               A226 226 0 1 1 688 744"
            fill="none" stroke="url(#gradA)" stroke-width="34" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="0 600 500;2 600 500;0 600 500" dur="6s" repeatCount="indefinite"/>
      </path>
      <path d="M686 744 L800 858"
            fill="none" stroke="url(#gradA)" stroke-width="34" stroke-linecap="round"/>
      <path d="M800 858 L852 910"
            fill="none" stroke="url(#gradA)" stroke-width="34" stroke-linecap="round"/>
    </g>

    <!-- inner network -->
    <g transform="translate(600 500)" stroke="url(#gradA)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
      <polygon points="0,-145 126,-72 126,72 0,145 -126,72 -126,-72">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="0,-88 76,-44 76,44 0,88 -76,44 -76,-44">
        <animateTransform attributeName="transform" type="rotate" values="360;0" dur="12s" repeatCount="indefinite"/>
      </polygon>

      <line x1="0" y1="-145" x2="0" y2="145"/>
      <line x1="-126" y1="-72" x2="126" y2="-72"/>
      <line x1="-126" y1="72" x2="126" y2="72"/>
      <line x1="-126" y1="-72" x2="126" y2="72"/>
      <line x1="-126" y1="72" x2="126" y2="-72"/>
      <line x1="0" y1="-145" x2="126" y2="-72"/>
      <line x1="0" y1="-145" x2="-126" y2="-72"/>
      <line x1="0" y1="145" x2="-126" y2="72"/>
      <line x1="0" y1="145" x2="126" y2="72"/>

      <g fill="#60a5fa">
        <circle cx="0" cy="-145" r="10"><animate attributeName="opacity" values="0.55;1;0.55" dur="1.8s" repeatCount="indefinite"/></circle>
        <circle cx="126" cy="-72" r="10"><animate attributeName="opacity" values="1;0.45;1" dur="2.2s" repeatCount="indefinite"/></circle>
        <circle cx="126" cy="72" r="10"><animate attributeName="opacity" values="0.45;1;0.45" dur="1.9s" repeatCount="indefinite"/></circle>
        <circle cx="0" cy="145" r="10"><animate attributeName="opacity" values="1;0.45;1" dur="2.3s" repeatCount="indefinite"/></circle>
        <circle cx="-126" cy="72" r="10"><animate attributeName="opacity" values="0.45;1;0.45" dur="2.1s" repeatCount="indefinite"/></circle>
        <circle cx="-126" cy="-72" r="10"><animate attributeName="opacity" values="1;0.45;1" dur="1.7s" repeatCount="indefinite"/></circle>
        <circle cx="-53" cy="-8" r="8"><animate attributeName="opacity" values="0.45;1;0.45" dur="1.6s" repeatCount="indefinite"/></circle>
        <circle cx="53" cy="-8" r="8"><animate attributeName="opacity" values="1;0.45;1" dur="1.8s" repeatCount="indefinite"/></circle>
        <circle cx="-36" cy="-72" r="8"><animate attributeName="opacity" values="0.45;1;0.45" dur="2.4s" repeatCount="indefinite"/></circle>
        <circle cx="36" cy="72" r="8"><animate attributeName="opacity" values="1;0.45;1" dur="2s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- central user + growth arrow -->
    <g transform="translate(600 500)" filter="url(#glow)">
      <circle cx="0" cy="-33" r="33" fill="url(#orb)">
        <animate attributeName="r" values="31;35;31" dur="2.6s" repeatCount="indefinite"/>
      </circle>
      <path d="M-48 60
               Q0 8 48 60
               L24 78
               Q0 48 -24 78 Z"
            fill="url(#gradA)"/>
      <path d="M-52 88 L-6 44 L34 85 L92 28"
            fill="none" stroke="url(#gradA)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M67 29 L101 20 L88 53 Z" fill="url(#gradA)"/>
    </g>

    <!-- animated sparkle -->
    <circle r="6" fill="#ffffff" opacity="0" filter="url(#soft)">
      <animateMotion dur="3.6s" repeatCount="indefinite" path="M430 330 C520 260, 670 255, 785 345"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#ffffff" opacity="0" filter="url(#soft)">
      <animateMotion dur="3.1s" begin="0.8s" repeatCount="indefinite" path="M325 525 C405 620, 520 690, 640 720"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.1s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- TEXT -->
  <g text-anchor="middle">
    <text x="600" y="1030" font-size="118" font-weight="800" font-family="Arial, Helvetica, sans-serif" fill="url(#gradText)">
      CareerLens
    </text>
    <text x="600" y="1096" font-size="44" font-weight="700" letter-spacing="2.5" font-family="Arial, Helvetica, sans-serif" fill="#c7d2fe">
      AI CAREER RECOMMENDATION
    </text>
  </g>
</svg>
